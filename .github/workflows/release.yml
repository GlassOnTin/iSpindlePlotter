name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and attach APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null || true

      # If RELEASE_KEYSTORE_BASE64 and friends are set as repository secrets,
      # decode the keystore and produce a properly-signed release APK. Without
      # those secrets, assembleDebug is built and attached — still installable,
      # just with the Android debug signing key.
      - name: Decode release keystore (optional)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/release.jks
          echo "path=${{ runner.temp }}/release.jks" >> "$GITHUB_OUTPUT"

      - name: Build release APK (signed)
        if: steps.keystore.outputs.path != ''
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Build debug APK (fallback, unsigned-for-release)
        if: steps.keystore.outputs.path == ''
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Collect APKs
        id: apks
        run: |
          mkdir -p release-apks
          shopt -s nullglob
          for f in app/build/outputs/apk/release/*.apk app/build/outputs/apk/debug/*.apk; do
            cp "$f" release-apks/
          done
          ls -la release-apks/
          echo "count=$(ls release-apks/*.apk | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-apks/*.apk
